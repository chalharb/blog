version: "3"

volumes:
  datafiles:


services:
  db:
    container_name: mysql_db
    image: mysql
    volumes:
      - datafiles:/var/lib/mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 1234
  api:
    container_name: api_service
    image: api
    build:
      context: ../Api
      dockerfile: Dockerfile
    depends_on:
      - db
    ports:
      - "8888:80"
    restart: always
    environment:
      - DBHOST=db
      - ASPNETCORE_ENVIRONMENT=production
